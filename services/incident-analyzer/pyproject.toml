# Tooling config for the incident-analyzer. No build system, the service runs
# straight from app/ via uvicorn, this only wires up pytest and ruff.

[tool.pytest.ini_options]
# Put the service root on sys.path so `import app.<module>` works when pytest
# is run from this directory.
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
# Default checks (pyflakes + a slice of pycodestyle) plus import sorting (I),
# bugbear (B), pyupgrade (UP) and flake8-bandit (S) — this service handles
# secrets/PII and shells out to no one, so the security lints are worth the
# noise. Line-length (E501) is intentionally left out so prose-y log/format
# strings don't fail the build.
select = ["E4", "E7", "E9", "F", "I", "B", "UP", "S"]

[tool.ruff.lint.per-file-ignores]
# Tests legitimately use `assert` (S101) and embed secret-shaped fixtures
# (S105/S106/S107) to exercise the masker, so those bandit rules don't apply.
"tests/*" = ["S101", "S105", "S106", "S107"]
