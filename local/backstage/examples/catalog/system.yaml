apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: forgepath
  description: |
    The ForgePath internal developer platform.

    Front door: **Backstage** (this UI), catalog, scaffolder templates,
    Kubernetes view, TechDocs.

    GitOps engine: **ArgoCD**, watches `gitops/` on GitHub, syncs platform
    and preview workloads, prunes when PRs close.

    Observability: **Prometheus + Grafana**, always-on, deployed by ArgoCD.

    Local environment: **kind** cluster mapped to localhost:7007 (Backstage),
    8080 (ArgoCD), 3000 (Grafana), 8888 (preview demo slot).
spec:
  owner: group:default/platform-team
