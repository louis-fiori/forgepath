apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.name }}
  # namespace omitted on purpose, ArgoCD's destination namespace
  # (preview-scaffold-<name> from the ApplicationSet template) controls placement.
  labels:
    app: ${{ values.name }}
    backstage.io/kubernetes-id: ${{ values.name }}
spec:
  replicas: ${{ values.replicas }}
  selector:
    matchLabels:
      app: ${{ values.name }}
  template:
    metadata:
      labels:
        app: ${{ values.name }}
        backstage.io/kubernetes-id: ${{ values.name }}
      {%- if values.exposeMetrics %}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "${{ values.metricsPort }}"
      {%- endif %}
    spec:
      containers:
        - name: app
          image: ${{ values.image }}
          ports:
            - name: http
              containerPort: ${{ values.port }}
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
