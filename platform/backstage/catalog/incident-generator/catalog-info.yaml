apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: incident-generator
  description: |
    Incident fixture for ForgePath. A small Go service that continuously emits structured JSON error logs and exposes on-demand failure endpoints
    (/boom, /panic, /slow, /leak, /crash, /error/{type}). It produces the raw material the AI Incident Analyzer will consume.
  annotations:
    backstage.io/techdocs-ref: dir:.
    backstage.io/kubernetes-label-selector: app=incident-generator
    pagerduty.com/integration-key: ''
  tags:
    - chaos
    - observability
    - incident-fixture
  links:
    - url: http://localhost:3000/d/cluster-pods?var-namespace=incident-generator
      title: Grafana pod metrics
      icon: dashboard
    - url: http://localhost:3000/d/service-logs?var-namespace=incident-generator
      title: Grafana logs
      icon: dashboard
    - url: http://localhost:3000/d/error-explorer?var-namespace=incident-generator
      title: Grafana errors
      icon: dashboard
    - url: http://localhost:8080/applications/incident-generator
      title: ArgoCD application
      icon: scaffolder
spec:
  type: service
  lifecycle: experimental
  owner: group:default/platform-team
  system: forgepath
