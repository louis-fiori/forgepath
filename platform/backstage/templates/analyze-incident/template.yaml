apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: analyze-incident
  title: Analyze an incident (AI Incident Analyzer)
  description: |
    Runs an on-demand incident analysis for a namespace via the incident-analyzer service. It pulls the recent errors + pod state, asks AI for a diagnosis, and (if enabled) opens a GitHub issue and sends a Backstage notification. The structured diagnosis is shown back here when the run completes.
    This does NOT deploy anything; it's a read-and-analyze action.
spec:
  owner: group:default/platform-team
  type: service
  parameters:
    - title: What to analyze
      required:
        - namespace
      properties:
        namespace:
          title: Namespace
          type: string
          default: incident-generator
          description: The workload namespace to analyze.
          ui:autofocus: true
        window:
          title: Lookback window
          type: string
          default: 10m
          description: LogQL range used to count/sample errors (e.g. 5m, 10m, 1h).
        force:
          title: Force (bypass dedup)
          type: boolean
          default: true
          description: Analyze even if the same incident was filed recently.
        openIssue:
          title: Open a GitHub issue for this run
          type: boolean
          default: true
          description: |
            Override issue creation just for this analysis. Leave unticked to
            get the diagnosis without filing an issue.

  steps:
    - id: analyze
      name: Run AI analysis
      action: incident-analyzer:analyze
      input:
        namespace: ${{ parameters.namespace }}
        window: ${{ parameters.window }}
        force: ${{ parameters.force }}
        openIssue: ${{ parameters.openIssue }}

  output:
    links:
      - title: View the filed GitHub issue
        url: ${{ steps.analyze.output.issueUrl }}
        icon: github
    text:
      - title: Diagnosis
        content: |
          **Namespace:** `${{ parameters.namespace }}`
          **Detected:** `${{ steps.analyze.output.detected }}`  ·  **Deduped:** `${{ steps.analyze.output.deduped }}`

          ${{ steps.analyze.output.summary }}

          | Field | Value |
          | --- | --- |
          | Severity | `${{ steps.analyze.output.severity }}` |
          | Affected component | `${{ steps.analyze.output.affectedComponent }}` |
          | Confidence | `${{ steps.analyze.output.confidence }}` |
          | Issue opened | `${{ steps.analyze.output.issueUrl }}` |
          | Notified | `${{ steps.analyze.output.notified }}` |

          **Probable root cause:** ${{ steps.analyze.output.probableRootCause }}

          **Recommended remediation:** ${{ steps.analyze.output.recommendedRemediation }}

          _Note: ${{ steps.analyze.output.note }}_
