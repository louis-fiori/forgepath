apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: deploy-service-to-kind
  title: Deploy a service (via GitHub PR)
  description: |
    Renders a minimal Deployment + Service for your image and opens a PR with the manifests under `gitops/workloads/<name>/`.
    The PR is labeled `preview`, so the ArgoCD ApplicationSet picks it up automatically and provisions a `preview-scaffold-<name>` namespace with your workload.
    The PR is the lifecycle handle: close it (or use the destroy template) to tear the preview down.
spec:
  owner: user:guest
  type: service
  parameters:
    - title: Service details
      required:
        - name
        - image
      properties:
        name:
          title: Service name
          type: string
          description: |
            DNS-1123 lowercase name. Used as Deployment/Service name, the workloads subdirectory in the PR (`gitops/workloads/<name>/`),
            the branch name (`scaffold-<name>`), and the preview namespace (`preview-scaffold-<name>`). 
            The 46 char cap leaves room for the namespace prefix under K8s's 63-char limit.
          pattern: '^[a-z]([-a-z0-9]*[a-z0-9])?$'
          maxLength: 46
          ui:autofocus: true
        image:
          title: Container image
          type: string
          default: nginx:1.27-alpine
        replicas:
          title: Replicas
          type: integer
          default: 1
          minimum: 1
          maximum: 5
        port:
          title: Container port
          type: integer
          default: 80
          minimum: 1
          maximum: 65535
        exposeMetrics:
          title: Expose /metrics for Prometheus scraping
          type: boolean
          default: false
          description: |
            Container CPU/memory are *always* visible in Prometheus via cAdvisor
            (no action needed). Enable this only if your image serves
            Prometheus-format metrics on /metrics (adds the prometheus.io/scrape
            annotation so the pod is added as a Prometheus target).
        metricsPort:
          title: Metrics port
          type: integer
          default: 80
          minimum: 1
          maximum: 65535
          description: Port the /metrics endpoint listens on (only used if exposeMetrics is true).
        exposeOnLocalhost:
          title: Expose on http://localhost:8888
          type: boolean
          default: false
          description: |
            Switches the Service to NodePort 30080, which kind maps to host
            port 8888 (see `local/kind-config.yaml`). Only one preview at a
            time can occupy this slot, flipping it on for a second service
            steals the port from whichever preview had it.
        ownerGroup:
          title: Owning team
          type: string
          default: platform-team
          description: |
            Backstage group that owns the Component (referenced as
            `group:default/<ownerGroup>` in catalog-info.yaml). Must exist
            in the catalog, see platform/backstage/catalog/org.yaml for
            the groups currently defined.

  steps:
    - id: fetch
      name: Render manifests
      action: fetch:template
      input:
        url: ./content
        # Mirrors the in-repo layout the PR will land in.
        targetPath: pr/gitops/workloads/${{ parameters.name }}
        values:
          name: ${{ parameters.name }}
          image: ${{ parameters.image }}
          replicas: ${{ parameters.replicas }}
          port: ${{ parameters.port }}
          exposeMetrics: ${{ parameters.exposeMetrics }}
          metricsPort: ${{ parameters.metricsPort }}
          exposeOnLocalhost: ${{ parameters.exposeOnLocalhost }}
          ownerGroup: ${{ parameters.ownerGroup }}

    - id: publish
      name: Open preview PR
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=${FORGEPATH_GITHUB_OWNER}&repo=${FORGEPATH_GITHUB_REPO}
        branchName: scaffold-${{ parameters.name }}
        title: '[forgepath-scaffold] Deploy ${{ parameters.name }}'
        description: |
          Auto-generated by the Backstage `deploy-service-to-kind` template.

          - **Service**: `${{ parameters.name }}`
          - **Image**: `${{ parameters.image }}`
          - **Replicas**: `${{ parameters.replicas }}`
          - **Port**: `${{ parameters.port }}`
          - **Metrics scraping**: `${{ parameters.exposeMetrics }}`
          - **Exposed on localhost:8888**: `${{ parameters.exposeOnLocalhost }}`

          ArgoCD will create the `preview-scaffold-<name>` namespace and deploy
          the workload there once the `preview` label is present. Closing this
          PR (or using the `destroy-service-from-kind` template) tears the
          preview down.
        targetBranchName: ${FORGEPATH_TARGET_BRANCH}
        sourcePath: pr
        gitAuthorName: forgepath-scaffolder
        gitAuthorEmail: scaffolder@forgepath.local

    # publish:github:pull-request can't set labels, so we add `preview` as a
    # post-step. The ApplicationSet only picks up PRs carrying this label.
    - id: label
      name: Apply preview label
      action: github:addLabels
      input:
        repoUrl: github.com?owner=${FORGEPATH_GITHUB_OWNER}&repo=${FORGEPATH_GITHUB_REPO}
        number: ${{ steps.publish.output.pullRequestNumber }}
        labels:
          - preview

    # Register the freshly-pushed catalog-info.yaml so the Component appears in
    # Backstage immediately. The URL points at the PR branch; once that branch is
    # deleted (merge or close) the location 404s and the entity is marked orphaned
    # on the next refresh. A `main`-targeted discovery provider will replace this.
    - id: register
      name: Register Component in Backstage catalog
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/${FORGEPATH_GITHUB_OWNER}/${FORGEPATH_GITHUB_REPO}/blob/scaffold-${{ parameters.name }}/gitops/workloads/${{ parameters.name }}/catalog-info.yaml

  output:
    links:
      - title: Open PR on GitHub
        url: ${{ steps.publish.output.remoteUrl }}
        icon: github
      - title: Open Component in Backstage
        entityRef: ${{ steps.register.output.entityRef }}
        icon: catalog
    text:
      - title: Preview PR opened
        content: |
          A preview PR for `${{ parameters.name }}` has been opened:
          ${{ steps.publish.output.remoteUrl }}

          Within ~60s ArgoCD will:
          1. Detect the PR via the `previews` ApplicationSet
          2. Create an Application `preview-scaffold-${{ parameters.name }}` pointing at the PR branch
          3. Deploy your manifests into namespace `preview-scaffold-${{ parameters.name }}`

          The Backstage Component `${{ steps.register.output.entityRef }}` is
          already registered, open it from the catalog to find the Docs
          tab (runbook), the Kubernetes tab (pods + logs), and pre-filtered
          Grafana dashboard links for both pod metrics (Prometheus) and
          service logs (Loki + Promtail).

          Watch the live state at http://localhost:8080/applications.
