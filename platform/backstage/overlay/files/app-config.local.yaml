# Forgepath overlay config — loaded *after* the scaffold's app-config.yaml so
# its keys override the defaults. Owned by platform/backstage/overlay/, do not
# edit the copy inside local/backstage/, it will be overwritten on the next
# overlay apply.

app:
  extensions:
    # The standalone /kubernetes page calls useEntity() outside of an
    # EntityProvider and crashes. The entity tab works fine — use
    # catalog → <component> → Kubernetes tab instead.
    - page:kubernetes: false

    # Force-enable the TechDocs entity tab. Defaults may not turn it on
    # automatically just from techdocsPlugin being in features:.
    - entity-content:techdocs: true

# Service-to-service auth. Enables the incident-analyzer (an external in-cluster
# service) to POST to the notifications API with a static bearer token. The token
# is shared via the BACKSTAGE_S2S_TOKEN env (mounted from the backstage-s2s-token
# Secret, generated by scripts/local-up.sh). dangerouslyDisableDefaultAuthPolicy
# keeps the existing guest-auth UI flows and internal plugin calls working while
# still accepting the external token — appropriate for a local-first demo.
backend:
  auth:
    dangerouslyDisableDefaultAuthPolicy: true
    externalAccess:
      - type: static
        options:
          token: ${BACKSTAGE_S2S_TOKEN}
          subject: incident-analyzer

# Read by the built-in publish:github:pull-request action and by our custom
# github:closePullRequest action. The token is mounted via the
# backstage-github-token Secret (see platform/argocd/bootstrap/).
integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

catalog:
  # Replaces the scaffold's locations (arrays don't merge across --config
  # files). Paths are relative to the backend process cwd; in the docker
  # image cwd is /app and the platform content is injected under examples/.
  locations:
    # Scaffold's User/Group entities (auth needs `user:default/guest`).
    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]

    # Platform Users and Groups (louis.fiori + platform-team).
    - type: file
      target: ./examples/catalog/org.yaml
      rules:
        - allow: [User, Group]

    # The forgepath System (groups all platform Components together).
    - type: file
      target: ./examples/catalog/system.yaml
      rules:
        - allow: [System]

    # The forgepath-platform Component lives next to its mkdocs.yml so
    # the TechDocs `dir:.` ref resolves inside its parent (the preparer
    # refuses any ref that escapes the entity's directory).
    - type: file
      target: ./examples/docs/catalog-info.yaml

    # Platform catalog content (from platform/backstage/catalog/)
    - type: file
      target: ./examples/catalog/observability.yaml

    # incident-generator fixture. Lives in its own subdir so the
    # techdocs-ref `dir:.` resolves next to its mkdocs.yml + docs/.
    - type: file
      target: ./examples/catalog/incident-generator/catalog-info.yaml

    # incident-analyzer — the AI Incident Analyzer. Same co-located layout.
    - type: file
      target: ./examples/catalog/incident-analyzer/catalog-info.yaml

    # Platform scaffolder templates (from platform/backstage/templates/)
    - type: file
      target: ./examples/templates/deploy-service-to-kind/template.yaml
      rules:
        - allow: [Template]

    - type: file
      target: ./examples/templates/destroy-service-from-kind/template.yaml
      rules:
        - allow: [Template]

    # On-demand AI analysis trigger (calls the incident-analyzer service).
    - type: file
      target: ./examples/templates/analyze-incident/template.yaml
      rules:
        - allow: [Template]

    # Single-log AI analysis (paste a line or search Loki).
    - type: file
      target: ./examples/templates/analyze-log/template.yaml
      rules:
        - allow: [Template]

# TechDocs builds documentation in-process from the platform/docs/ markdown
# sources (mounted into the image under examples/docs/). mkdocs +
# mkdocs-techdocs-core are installed by the overlay Dockerfile so the
# `local` generator finds them on PATH.
techdocs:
  builder: 'local'
  generator:
    runIn: 'local'
  publisher:
    type: 'local'

kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  clusterLocatorMethods:
    - type: 'config'
      clusters:
        - name: forgepath
          url: https://kubernetes.default.svc
          authProvider: 'serviceAccount'
          skipTLSVerify: true
  customResources:
    - group: 'networking.k8s.io'
      apiVersion: 'v1'
      plural: 'ingresses'
