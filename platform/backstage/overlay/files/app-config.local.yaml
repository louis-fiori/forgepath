# Forgepath overlay config — loaded *after* the scaffold's app-config.yaml so its
# keys override the defaults. Owned by platform/backstage/overlay/; don't edit the
# copy in local/backstage/, it's overwritten on the next overlay apply.

app:
  extensions:
    # The standalone /kubernetes page calls useEntity() outside an EntityProvider
    # and crashes. Use catalog → <component> → Kubernetes tab instead.
    - page:kubernetes: false

    # Force-enable the TechDocs entity tab; techdocsPlugin in features: may not.
    - entity-content:techdocs: true

# Service-to-service auth: lets the in-cluster incident-analyzer POST to the
# notifications API with a static bearer token (BACKSTAGE_S2S_TOKEN, from the
# backstage-s2s-token Secret). dangerouslyDisableDefaultAuthPolicy keeps guest
# auth + internal plugin calls working alongside it — fine for a local-first demo.
backend:
  auth:
    dangerouslyDisableDefaultAuthPolicy: true
    externalAccess:
      - type: static
        options:
          token: ${BACKSTAGE_S2S_TOKEN}
          subject: incident-analyzer

# Read by the built-in publish:github:pull-request action and by our custom
# github:closePullRequest action. The token is mounted via the
# backstage-github-token Secret (see platform/argocd/bootstrap/).
integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

catalog:
  # Replaces the scaffold's locations (arrays don't merge across --config files).
  # Paths are relative to the backend cwd; in the image cwd=/app, platform content
  # is injected under examples/.
  locations:
    # Scaffold's User/Group entities (auth needs `user:default/guest`).
    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]

    # Platform Users and Groups (louis.fiori + platform-team).
    - type: file
      target: ./examples/catalog/org.yaml
      rules:
        - allow: [User, Group]

    # The forgepath System (groups all platform Components together).
    - type: file
      target: ./examples/catalog/system.yaml
      rules:
        - allow: [System]

    # Lives next to its mkdocs.yml so the TechDocs `dir:.` ref resolves inside
    # its parent (the preparer refuses a ref that escapes the entity's directory).
    - type: file
      target: ./examples/docs/catalog-info.yaml

    # Platform catalog content (from platform/backstage/catalog/)
    - type: file
      target: ./examples/catalog/observability.yaml

    # incident-generator fixture. Lives in its own subdir so the
    # techdocs-ref `dir:.` resolves next to its mkdocs.yml + docs/.
    - type: file
      target: ./examples/catalog/incident-generator/catalog-info.yaml

    # incident-analyzer — the AI Incident Analyzer. Same co-located layout.
    - type: file
      target: ./examples/catalog/incident-analyzer/catalog-info.yaml

    # Platform scaffolder templates (from platform/backstage/templates/)
    - type: file
      target: ./examples/templates/deploy-service-to-kind/template.yaml
      rules:
        - allow: [Template]

    - type: file
      target: ./examples/templates/destroy-service-from-kind/template.yaml
      rules:
        - allow: [Template]

    # On-demand AI analysis trigger (calls the incident-analyzer service).
    - type: file
      target: ./examples/templates/analyze-incident/template.yaml
      rules:
        - allow: [Template]

    # Single-log AI analysis (paste a line or search Loki).
    - type: file
      target: ./examples/templates/analyze-log/template.yaml
      rules:
        - allow: [Template]

# TechDocs builds docs in-process from platform/docs/ (mounted under examples/docs/).
# mkdocs + mkdocs-techdocs-core are installed by the overlay Dockerfile so the
# `local` generator finds them on PATH.
techdocs:
  builder: 'local'
  generator:
    runIn: 'local'
  publisher:
    type: 'local'

kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  clusterLocatorMethods:
    - type: 'config'
      clusters:
        - name: forgepath
          url: https://kubernetes.default.svc
          authProvider: 'serviceAccount'
          skipTLSVerify: true
  customResources:
    - group: 'networking.k8s.io'
      apiVersion: 'v1'
      plural: 'ingresses'
