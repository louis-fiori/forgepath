apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  # repoURL/targetRevision below carry ${FORGEPATH_*} placeholders that
  # scripts/local-up.sh renders before kubectl-applying. envsubst works here
  # (the bootstrap applies this file directly; ArgoCD never reads it from git),
  # so a fork just edits .env and re-runs `make local-up`. The generated
  # Applications live in-cluster with the rendered values, not ${...}.
  generators:
    # One Application per platform component. Adding a component = add its name
    # here; its manifests live under gitops/platform/<name>/.
    - list:
        elements:
          - name: backstage
          - name: grafana
          - name: loki
          - name: prometheus
          - name: incident-generator
          - name: incident-analyzer
  template:
    metadata:
      name: '{{name}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/${FORGEPATH_GITHUB_OWNER}/${FORGEPATH_GITHUB_REPO}.git
        targetRevision: ${FORGEPATH_TARGET_BRANCH}
        path: gitops/platform/{{name}}
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          # selfHeal off on purpose: an operator can debug in-place (kubectl
          # edit/scale) before ArgoCD reconciles (see docs/architecture.md;
          # previews use selfHeal: true — Git is source of truth).
          selfHeal: false
        syncOptions:
          - ServerSideApply=true
