apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  # repoURL/targetRevision below are ${FORGEPATH_*} placeholders that
  # scripts/local-up.sh renders (forgepath_render/sed) before kubectl-applying
  # this manifest. envsubst works *here* — unlike the old gitops/apps/*.yaml —
  # because the bootstrap applies this file directly; ArgoCD never reads it
  # from git. A fork just edits .env and re-runs `make local-up`: no in-place
  # rebrand, no `make configure`, no commit. The Applications this AppSet
  # generates live in-cluster, so they carry the rendered values, not ${...}.
  generators:
    # One Application per platform component. Adding a component = add its name
    # here; its manifests live under gitops/platform/<name>/.
    - list:
        elements:
          - name: backstage
          - name: grafana
          - name: loki
          - name: prometheus
          - name: incident-generator
          - name: incident-analyzer
  template:
    metadata:
      name: '{{name}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/${FORGEPATH_GITHUB_OWNER}/${FORGEPATH_GITHUB_REPO}.git
        targetRevision: ${FORGEPATH_TARGET_BRANCH}
        path: gitops/platform/{{name}}
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          # selfHeal stays off for platform components on purpose: it lets an operator
          # debug in-place (kubectl edit/scale) before ArgoCD reconciles. Documented in
          # docs/architecture.md. (previews use selfHeal: true — Git is source of truth.)
          selfHeal: false
        syncOptions:
          - ServerSideApply=true
