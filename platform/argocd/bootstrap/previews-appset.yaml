apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: previews
  namespace: argocd
spec:
  syncPolicy:
    applicationsSync: sync
    preserveResourcesOnDeletion: false

  generators:
    # owner/repo and the template repoURL/targetRevision below are ${FORGEPATH_*}
    # placeholders rendered by scripts/local-up.sh before apply (the bootstrap
    # kubectl-applies this file directly; ArgoCD never reads it from git, so
    # envsubst works). '{{branch}}' is an AppSet template var the pullRequest
    # generator fills per PR — left as-is, not a placeholder.
    - pullRequest:
        github:
          owner: ${FORGEPATH_GITHUB_OWNER}
          repo: ${FORGEPATH_GITHUB_REPO}
          labels:
            - preview
          tokenRef:
            secretName: forgepath-repo-creds
            key: password
        requeueAfterSeconds: 60

  template:
    metadata:
      name: 'preview-{{branch}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/${FORGEPATH_GITHUB_OWNER}/${FORGEPATH_GITHUB_REPO}.git
        targetRevision: '{{branch}}'
        path: gitops/workloads
        directory:
          recurse: true
          include: '*/k8s/*.yaml'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'preview-{{branch}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
