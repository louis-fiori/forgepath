apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-generator
  namespace: incident-generator
  labels:
    app: incident-generator
    backstage.io/kubernetes-id: incident-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-generator
  template:
    metadata:
      labels:
        app: incident-generator
        backstage.io/kubernetes-id: incident-generator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Stdlib-only HTTP server; no Kubernetes API calls → no SA token needed.
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65532
        runAsUser: 65532
        runAsNonRoot: true
      containers:
        - name: app
          image: incident-generator:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            # Static Go binary on distroless that only listens; it writes nothing
            # to the root fs, so it can run with it read-only.
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: EMIT_INTERVAL
              value: "5s"
            - name: ERROR_RATIO
              value: "0.7"
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
