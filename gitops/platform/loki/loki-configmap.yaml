apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: loki
data:
  loki-config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      log_level: info

    common:
      path_prefix: /var/loki
      storage:
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      # Generous demo defaults, these are intentionally permissive so a
      # bursty preview workload won't get throttled in the middle of a
      # walkthrough. Tighten before any production use.
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32
      reject_old_samples: false
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 72h

    compactor:
      working_directory: /var/loki/compactor
      retention_enabled: true
      delete_request_store: filesystem

    ruler:
      storage:
        type: local
        local:
          directory: /var/loki/rules
      rule_path: /var/loki/rules-tmp
      ring:
        kvstore:
          store: inmemory
      enable_api: true

    analytics:
      # Opt out of telemetry, irrelevant for a local starter kit.
      reporting_enabled: false
