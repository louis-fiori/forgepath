apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: loki
data:
  promtail-config.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: info

    positions:
      # Persisted across restarts so promtail doesn't replay all logs on crash.
      # emptyDir is fine: losing positions just means a one-time re-ingestion.
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki.loki.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      # Single scrape job for every container log on the node. Kubernetes SD
      # enriches each line with namespace/pod/container labels, which makes the
      # "filter by namespace" query in Grafana snappy.
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          # kind uses containerd; its lines are CRI-format
          # (`<timestamp> <stream> <flags> <log>`). Extract the payload so the
          # Logs panel shows clean text, not the prefix.
          - cri: {}
        relabel_configs:
          # Each DaemonSet pod handles only its own node's logs (no duplicate
          # ingestion).
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          # Build the log file path promtail tails (kubelet's on-disk layout).
          - source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
            separator: /
            replacement: /var/log/pods/*$1/*.log
