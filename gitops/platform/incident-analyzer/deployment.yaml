apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-analyzer
  namespace: incident-analyzer
  labels:
    app: incident-analyzer
    backstage.io/kubernetes-id: incident-analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-analyzer
  template:
    metadata:
      labels:
        app: incident-analyzer
        backstage.io/kubernetes-id: incident-analyzer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: incident-analyzer
      securityContext:
        fsGroup: 65532
        runAsUser: 65532
        runAsNonRoot: true
      containers:
        - name: app
          image: incident-analyzer:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            # Root fs read-only: writes go to /tmp (HOME=/tmp, mounted below).
            # Python just skips writing .pyc to /app, which is fine.
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
          # Secret-backed config comes from the incident-analyzer-secrets Secret;
          # its keys match these env vars (UPPER_SNAKE), so one secretRef replaces
          # ~20 secretKeyRef blocks. optional: absent in local/poll-only dev, a
          # missing key just leaves the var at its default. Keep keys in sync with
          # scripts/local-up.sh and scripts/incident-analyzer-secrets.sh.
          envFrom:
            - secretRef:
                name: incident-analyzer-secrets
                optional: true
          # Fixed, non-secret config. An explicit env entry would win over envFrom
          # on a name clash; there's none here (these names aren't in the Secret).
          env:
            - name: AWS_CONFIG_FILE
              value: "/aws/config"
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: "/aws/credentials"
            - name: HOME
              value: "/tmp"
            - name: LOKI_URL
              value: "http://loki.loki.svc.cluster.local:3100"
            - name: PROMETHEUS_URL
              value: "http://prometheus.prometheus.svc.cluster.local:9090"
            - name: BACKSTAGE_URL
              value: "http://backstage.backstage.svc.cluster.local:7007"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: aws
              mountPath: /aws
              readOnly: true
            # Writable scratch for HOME=/tmp (botocore/SSO caches) now that the
            # root fs is read-only.
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: aws
          secret:
            secretName: incident-analyzer-aws
            optional: true
        - name: tmp
          emptyDir: {}
