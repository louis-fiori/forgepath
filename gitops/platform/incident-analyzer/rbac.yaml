apiVersion: v1
kind: ServiceAccount
metadata:
  name: incident-analyzer
  namespace: incident-analyzer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: incident-analyzer-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: incident-analyzer-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: incident-analyzer-reader
subjects:
  - kind: ServiceAccount
    name: incident-analyzer
    namespace: incident-analyzer
