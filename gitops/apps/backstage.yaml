apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # repoURL/targetRevision are baked in by `make configure` (sed), NOT ${...}
    # envsubst: ArgoCD reconciles this child app straight from git and can't honor
    # runtime substitution. On a fork, run `make configure`, then commit + push.
    # (root-app.yaml uses ${...} because local-up.sh renders it at apply time.)
    repoURL: https://github.com/louis-fiori/forgepath.git
    targetRevision: dev
    path: gitops/platform/backstage
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      # selfHeal stays off for platform components on purpose: it lets an operator
      # debug in-place (kubectl edit/scale) before ArgoCD reconciles. Documented in
      # docs/architecture.md. (previews use selfHeal: true — Git is source of truth.)
      selfHeal: false
    syncOptions:
      - ServerSideApply=true
